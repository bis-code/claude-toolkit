<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Toolkit Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <!-- ── Header bar ──────────────────────────────────────────── -->
  <header class="header">
    <div class="header__left">
      <span class="header__title">CLAUDE TOOLKIT</span>
      <span class="header__version">v5.0.0</span>
    </div>
    <div class="header__right">
      <span class="live-dot" id="live-dot"></span>
      <span class="live-text" id="live-text">Connecting...</span>
    </div>
  </header>

  <!-- ── SVG canvas (fills viewport below header) ────────────── -->
  <svg id="graph" class="graph"></svg>

  <!-- ── Detail panel overlay (right side, slides in) ────────── -->
  <div class="detail-panel" id="detail-panel">
    <div class="detail-panel__header">
      <span class="detail-panel__title" id="detail-title">Details</span>
      <button class="detail-panel__close" id="detail-close">&times;</button>
    </div>
    <div class="detail-panel__body" id="detail-body"></div>
  </div>

  <!-- ── Tooltip ─────────────────────────────────────────────── -->
  <div class="tooltip" id="tooltip"></div>

<script src="/app.js"></script>
</body>
</html>
