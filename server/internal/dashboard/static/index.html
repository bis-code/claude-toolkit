<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Toolkit Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

<div class="dashboard">

  <!-- ── Header ─────────────────────────────────────────────── -->
  <header class="header">
    <span class="header__title">CLAUDE TOOLKIT v5.0.0</span>
    <div class="live-indicator">
      <span class="live-dot" id="live-dot"></span>
      <span id="live-text">Connecting…</span>
    </div>
    <span class="header__port">:<!-- port injected by JS --><span id="header-port"></span></span>
  </header>

  <!-- ── Active session ─────────────────────────────────────── -->
  <section class="panel">
    <div class="panel__title">Active Session</div>
    <div class="active-session" id="active-session-content">
      <span class="text-muted">Loading…</span>
    </div>
  </section>

  <!-- ── Live events ────────────────────────────────────────── -->
  <section class="panel">
    <div class="panel__title">Live Events</div>
    <div class="events-feed" id="events-feed">
      <div class="empty-feed">Waiting for events…</div>
    </div>
  </section>

  <!-- ── Recent sessions ────────────────────────────────────── -->
  <section class="panel">
    <div class="panel__title">Recent Sessions</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Session ID</th>
            <th>Project</th>
            <th>Duration</th>
            <th>Tasks</th>
            <th>Started</th>
          </tr>
        </thead>
        <tbody id="sessions-tbody">
          <tr><td colspan="5" class="empty-state">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </section>

  <!-- ── Skills + Patterns ──────────────────────────────────── -->
  <div class="panels-row">

    <!-- Skills panel -->
    <section class="panel">
      <div class="panel__title">Skills — Effectiveness</div>
      <div class="skill-list" id="skills-list">
        <div class="empty-state">Loading…</div>
      </div>
    </section>

    <!-- Learned patterns panel -->
    <section class="panel">
      <div class="panel__title">Learned Patterns</div>
      <div class="pattern-list" id="patterns-list">
        <div class="empty-state">Loading…</div>
      </div>
    </section>

  </div>

  <!-- ── Patrol ──────────────────────────────────────────────── -->
  <section class="panel">
    <div class="panel__title">Patrol</div>

    <div class="patrol-status">
      <div class="patrol-light patrol-light--green" id="patrol-light"></div>
      <span class="patrol-label" id="patrol-status-label">Initialising…</span>
    </div>

    <div class="alert-list" id="patrol-alerts">
      <div class="no-alerts">Monitoring all sessions…</div>
    </div>
  </section>

</div>

<script src="/app.js"></script>
</body>
</html>
