<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Toolkit Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <!-- ── Header bar ──────────────────────────────────────────── -->
  <header class="header">
    <div class="header__left">
      <span class="header__title">CLAUDE TOOLKIT</span>
      <span class="header__version">v5.0.0</span>
    </div>
    <div class="header__right">
      <span class="live-dot" id="live-dot"></span>
      <span class="live-text" id="live-text">Connecting...</span>
      <span class="zoom-indicator" id="zoom-indicator">100%</span>
    </div>
  </header>

  <!-- ── Main layout: graph + fixed detail panel ──────────────── -->
  <div class="main-layout">

    <!-- SVG canvas with zoom/pan -->
    <div class="graph-container" id="graph-container">
      <svg id="graph" class="graph">
        <g id="graph-root"></g>
      </svg>
    </div>

    <!-- Fixed detail panel (always visible) -->
    <div class="detail-panel" id="detail-panel">
      <div class="detail-panel__header">
        <span class="detail-panel__title" id="detail-title">Select a node</span>
      </div>
      <div class="detail-panel__body" id="detail-body">
        <p class="detail-empty">Double-click any node to view details.</p>
      </div>
    </div>

  </div>

  <!-- ── Tooltip ─────────────────────────────────────────────── -->
  <div class="tooltip" id="tooltip"></div>

<script src="/app.js"></script>
</body>
</html>
